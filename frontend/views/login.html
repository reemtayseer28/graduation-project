<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>مساعد الشرطة المجتمعية - تسجيل الدخول</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      text-align: center;
    }

    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 12px;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Placeholder shield logo */
    .logo-placeholder {
      width: 64px;
      height: 64px;
      margin: 0 auto 12px;
      background: #1a7a5e;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    h2 {
      color: #1a7a5e;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .subtitle {
      color: #888;
      font-size: 13px;
      margin-bottom: 24px;
    }

    /* User Type Tabs */
    .user-type-label {
      text-align: right;
      font-size: 13px;
      color: #444;
      margin-bottom: 8px;
    }

    .type-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .type-tabs button {
      flex: 1;
      padding: 9px 0;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      background: white;
      color: #555;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .type-tabs button.active {
      background: #1a7a5e;
      color: white;
      border-color: #1a7a5e;
      font-weight: 600;
    }

    .type-tabs button:hover:not(.active) {
      border-color: #1a7a5e;
      color: #1a7a5e;
    }

    /* Input fields */
    .input-group {
      margin-bottom: 16px;
      text-align: right;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      color: #444;
      margin-bottom: 6px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper input {
      width: 100%;
      padding: 11px 38px 11px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #333;
      outline: none;
      transition: border 0.2s;
      text-align: right;
    }

    .input-wrapper input:focus {
      border-color: #1a7a5e;
    }

    .input-wrapper .icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      font-size: 16px;
    }

    /* Remember + Forgot */
    .row-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-size: 13px;
    }

    .row-between label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #555;
      cursor: pointer;
    }

    .row-between input[type="checkbox"] {
      accent-color: #1a7a5e;
    }

    .forgot {
      color: #1a7a5e;
      text-decoration: none;
      font-size: 13px;
    }

    .forgot:hover { text-decoration: underline; }

    /* Login button */
    .btn-login {
      width: 100%;
      padding: 13px;
      background: #1a7a5e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
      margin-bottom: 16px;
    }

    .btn-login:hover { background: #155f49; }

    /* Register link */
    .register-link {
      font-size: 13px;
      color: #555;
    }

    .register-link a {
      color: #1a7a5e;
      text-decoration: none;
      font-weight: 600;
    }

    .register-link a:hover { text-decoration: underline; }

    /* Footer icons */
    .footer-support {
      margin-top: 24px;
      font-size: 12px;
      color: #aaa;
    }

    .footer-icons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 8px;
      font-size: 20px;
    }

    .footer-icons span {
      cursor: pointer;
      color: #888;
      transition: color 0.2s;
    }

    .footer-icons span:hover { color: #1a7a5e; }

    /* Error message */
    .error-msg {
      background: #fff0f0;
      color: #d00;
      border: 1px solid #fcc;
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- Logo -->
    <div class="logo-placeholder">🛡️</div>

    <h2>مساعد الشرطة المجتمعية</h2>
    <p class="subtitle">تسجيل الدخول إلى حسابك</p>

    <!-- User Type -->
    <div class="user-type-label">نوع المستخدم</div>
    <div class="type-tabs">
      <button class="active" onclick="selectType(this)">مواطن</button>
      <button onclick="selectType(this)">ضابط</button>
      <button onclick="selectType(this)">مشرف</button>
    </div>

    <!-- Error -->
    <div class="error-msg" id="errorMsg">اسم المستخدم أو كلمة المرور غير صحيحة</div>

    <!-- Username -->
    <div class="input-group">
      <label>اسم المستخدم</label>
      <div class="input-wrapper">
        <span class="icon">👤</span>
        <input type="text" id="username" placeholder="أدخل اسم المستخدم" />
      </div>
    </div>

    <!-- Password -->
    <div class="input-group">
      <label>كلمة المرور</label>
      <div class="input-wrapper">
        <span class="icon">🔒</span>
        <input type="password" id="password" placeholder="أدخل كلمة المرور" />
      </div>
    </div>

    <!-- Remember / Forgot -->
    <div class="row-between">
      <label>
        <input type="checkbox" /> تذكرني
      </label>
      <a href="#" class="forgot">نسيت كلمة المرور؟</a>
    </div>

    <!-- Login Button -->
    <button class="btn-login" onclick="handleLogin()">تسجيل الدخول</button>

    <!-- Register -->
    <p class="register-link">ليس لديك حساب؟ <a href="#">إنشاء حساب جديد</a></p>

    <!-- Support -->
    <div class="footer-support">
      للمساعدة والدعم الفني، يرجى التواصل معنا
      <div class="footer-icons">
        <span title="واتساب">💬</span>
        <span title="بريد إلكتروني">✉️</span>
        <span title="هاتف">📞</span>
      </div>
    </div>

  </div>

  <script>
    function selectType(btn) {
      document.querySelectorAll('.type-tabs button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorMsg = document.getElementById('errorMsg');

      if (!username || !password) {
        errorMsg.textContent = 'يرجى إدخال اسم المستخدم وكلمة المرور';
        errorMsg.style.display = 'block';
        return;
      }

      // هون رح يتربط مع الـ backend لاحقاً
      errorMsg.style.display = 'none';
      alert('جاري تسجيل الدخول... (سيتم الربط مع الـ backend لاحقاً)');
    }
  </script>

</body>
</html>
